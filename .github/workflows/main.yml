name: Auto Build (Nightly)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write # 必须权限

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Run Pack.cmd
        shell: cmd
        run: call Pack.cmd

      # ========================================================
      # 修复核心：先删除旧的 Release 和 Tag，防止文件冲突
      # ========================================================
      - name: Delete Old Nightly Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 尝试删除名为 nightly 的 release 和 tag
          # || true 表示如果本来就没有（比如第一次运行），也不报错继续往下走
          gh release delete nightly --cleanup-tag -y || true

      # ========================================================
      # 创建新的 Tag 并推送
      # ========================================================
      - name: Update Nightly Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag nightly
          git push origin nightly

      # ========================================================
      # 发布新的 Release
      # ========================================================
      - name: Release Nightly
        uses: softprops/action-gh-release@v1
        with:
          tag_name: nightly
          name: "最新测试补丁 (Nightly)"
          body: |
            自动构建版本。
            提交: ${{ github.sha }}
            时间: ${{ github.event.head_commit.timestamp }}
          files: dist/*.exe  # 即使是中文文件名，因为是全新的 Release，也能成功上传
          prerelease: true
