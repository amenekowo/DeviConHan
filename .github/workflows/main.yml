name: Build and Release Patch

on:
  # 方式1：当你推送形如 v1.0, v0.2 这样的 tag 时触发
  push:
    tags:
      - 'v*'
  # 方式2：允许在网页端手动点击按钮触发（用于测试）
  workflow_dispatch:

permissions:
  contents: write # 必须给予写权限，否则无法创建 Release

jobs:
  build-and-release:
    runs-on: windows-latest # 因为是 .cmd 且生成 exe，必须用 Windows 环境

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 配置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # 根据你的实际需求调整版本

      # 3. 安装 PyInstaller (假设你的 cmd 里没有pip install步骤)
      - name: Install PyInstaller
        run: |
          pip install pyinstaller
          # 如果有其他依赖，也可以在这里 pip install -r requirements.txt

      # 4. 执行你的打包脚本
      - name: Run Pack.cmd
        shell: cmd
        run: |
          call Pack.cmd
        # 注意：确保 Pack.cmd 里不要有 'pause'，否则会卡死！

      # 5. 上传 Release
      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/') # 只有打 tag 时才发布，手动触发不发布
        with:
          # 这里配置你要发布的文件路径
          # 假设 Pack.cmd 用 PyInstaller 生成的文件在 dist 文件夹下
          files: |
            dist/*.exe
            # 或者如果你打包成了 zip，就写 dist/*.zip
          
          # 自动生成 Release 标题和说明
          generate_release_notes: true
